<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monetag Ads Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- আপনার Monetag script এখানে বসান -->
    <!-- <script src="https://alwingulla.com/88/vki/shareable/11209230/code.js" defer></script> -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #eef2f3; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .phone-container { width: 100%; max-width: 430px; background: #f5f7fb; display: flex; flex-direction: column; min-height: 100vh; }
        .header { background: #fff; padding: 14px 16px; display: flex; align-items: center; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 10; }
        .header i { color: #555; font-size: 18px; cursor: pointer; }
        .header-info { margin-left: 12px; flex-grow: 1; }
        .header-info h3 { font-size: 15px; color: #222; }
        .header-info p { font-size: 11px; color: #888; }
        .chat-content { padding: 14px; flex-grow: 1; overflow-y: auto; }
        .welcome-box { background: #fff; padding: 14px; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 14px; border: 1px solid #e6ebf1; }
        .welcome-box p { font-size: 14px; color: #333; line-height: 1.5; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn { padding: 13px 8px; border: none; border-radius: 9px; font-weight: 700; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; font-size: 14px; transition: opacity .15s; }
        .btn:active { opacity: .8; }
        .btn-watch { background: #2ca02c; }
        .btn-auto { background: #3a86ff; }
        .btn-stop { background: #e63946; width: 100%; margin-bottom: 16px; }
        .divider { text-align: center; color: #666; font-size: 13px; margin: 10px 0 12px; font-weight: 600; }
        .config-btn { background: #7d8b99; color: #fff; width: 100%; padding: 13px; border: none; border-radius: 9px; margin-bottom: 8px; font-size: 14px; display: flex; align-items: center; justify-content: flex-start; gap: 10px; font-weight: 500; cursor: pointer; transition: background .15s; }
        .config-btn span.val { margin-left: auto; font-size: 12px; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 20px; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .config-btn:active { background: #5f6e7a; }
        .btn-location { background: #ff9f1c; margin-top: 4px; }
        .btn-clear { background: #c0392b; margin-top: 4px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; justify-content: center; align-items: flex-end; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; width: 100%; max-width: 430px; border-radius: 18px 18px 0 0; padding: 22px 20px 30px; }
        .modal h4 { font-size: 15px; margin-bottom: 14px; color: #222; }
        .modal input { width: 100%; padding: 12px 14px; border: 1.5px solid #d0d7de; border-radius: 9px; font-size: 14px; outline: none; }
        .modal input:focus { border-color: #3a86ff; }
        .modal-btns { display: flex; gap: 10px; margin-top: 14px; }
        .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 9px; font-size: 14px; font-weight: 700; cursor: pointer; }
        .btn-save { background: #3a86ff; color: #fff; }
        .btn-cancel { background: #e9ecef; color: #444; }

        /* Toast */
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 10px 22px; border-radius: 30px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
        .toast.show { opacity: 1; }

        /* Location card */
        .location-card { background: #fff; border-radius: 12px; padding: 14px; margin-top: 12px; border: 1px solid #e0e0e0; display: none; }
        .location-card.show { display: block; }
        .location-card p { font-size: 13px; color: #444; line-height: 1.9; }

        .footer-nav { background: #fff; display: flex; justify-content: space-around; padding: 13px 0; border-top: 1px solid #e0e0e0; position: sticky; bottom: 0; }
        .footer-nav i { font-size: 20px; color: #8fa0af; cursor: pointer; }
        .footer-nav i.active { color: #3a86ff; }
    </style>
</head>
<body>
<div class="phone-container">
    <div class="header">
        <i class="fa-solid fa-arrow-left"></i>
        <div class="header-info">
            <h3>📢 Monetag Ads Bot</h3>
            <p>bot</p>
        </div>
        <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <div class="chat-content">
        <div class="welcome-box">
            <p>👋 <strong>Welcome to Monetag Ads Bot!</strong><br>Generate revenue by watching ads. Choose an option below.</p>
        </div>

        <div class="btn-grid">
            <button class="btn btn-watch" id="watchAdBtn"><i class="fa-solid fa-circle-play"></i> Watch Ads</button>
            <button class="btn btn-auto" id="autoWatchBtn"><i class="fa-solid fa-arrows-rotate"></i> Auto Watch</button>
        </div>
        <button class="btn btn-stop" id="stopAutoBtn"><i class="fa-solid fa-stop"></i> Stop Auto Watch</button>

        <div class="divider">--- Proxy Configuration ---</div>
        <button class="config-btn" onclick="openModal('HOST','host','text')">
            <i class="fa-solid fa-gear"></i> HOST <span class="val" id="val-host">Not Set</span>
        </button>
        <button class="config-btn" onclick="openModal('PORT','port','number')">
            <i class="fa-solid fa-earth-americas"></i> PORT <span class="val" id="val-port">Not Set</span>
        </button>
        <button class="config-btn" onclick="openModal('Username','username','text')">
            <i class="fa-solid fa-user"></i> Username <span class="val" id="val-username">Not Set</span>
        </button>
        <button class="config-btn" onclick="openModal('Password','password','password')">
            <i class="fa-solid fa-key"></i> Password <span class="val" id="val-password">Not Set</span>
        </button>
        <button class="config-btn btn-location" id="showLocationBtn">
            <i class="fa-solid fa-map-location-dot"></i> Show Proxy Location
        </button>
        <button class="config-btn btn-clear" onclick="clearProxy()">
            <i class="fa-solid fa-trash"></i> Clear Proxy Config
        </button>

        <div class="location-card" id="locationCard">
            <p id="locationText"></p>
        </div>
    </div>

    <div class="footer-nav">
        <i class="fa-solid fa-comment-dots active"></i>
        <i class="fa-solid fa-user-gear"></i>
        <i class="fa-solid fa-sliders"></i>
        <i class="fa-solid fa-gear"></i>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h4 id="modalTitle">Enter value</h4>
        <input type="text" id="modalInput" placeholder="এখানে লিখুন...">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">বাতিল</button>
            <button class="btn-save" onclick="saveModal()">✅ সেভ করুন</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }

    // URL params থেকে auto mode চেক
    const urlParams = new URLSearchParams(window.location.search);
    let autoWatchInterval = null;

    // Proxy data localStorage-এ রাখা হবে
    const PROXY_KEY = 'monetag_proxy';
    function loadProxy() {
        try { return JSON.parse(localStorage.getItem(PROXY_KEY)) || {}; } catch { return {}; }
    }
    function saveProxy(data) { localStorage.setItem(PROXY_KEY, JSON.stringify(data)); }

    function refreshDisplay() {
        const p = loadProxy();
        document.getElementById('val-host').textContent = p.host || 'Not Set';
        document.getElementById('val-port').textContent = p.port || 'Not Set';
        document.getElementById('val-username').textContent = p.username || 'Not Set';
        document.getElementById('val-password').textContent = p.password ? '●●●●●' : 'Not Set';
    }
    refreshDisplay();

    // Auto watch check
    if (urlParams.get('mode') === 'auto') {
        showToast('Auto Watch শুরু হয়েছে!');
        autoWatchInterval = setInterval(() => runMonetagAd(), 15000);
    }

    // Modal logic
    let currentField = '';
    let currentInputType = 'text';

    function openModal(label, field, type) {
        currentField = field;
        document.getElementById('modalTitle').textContent = `✏️ ${label} লিখুন`;
        const inp = document.getElementById('modalInput');
        inp.type = type;
        const p = loadProxy();
        inp.value = (type === 'password') ? '' : (p[field] || '');
        inp.placeholder = `${label} এখানে লিখুন...`;
        document.getElementById('modalOverlay').classList.add('show');
        setTimeout(() => inp.focus(), 100);
    }
    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('show');
        currentField = '';
    }
    function saveModal() {
        const val = document.getElementById('modalInput').value.trim();
        if (!val) { showToast('⚠️ খালি রাখা যাবে না!'); return; }
        const p = loadProxy();
        p[currentField] = val;
        saveProxy(p);
        refreshDisplay();
        closeModal();
        showToast(`✅ ${currentField.toUpperCase()} সেভ হয়েছে!`);
    }
    // Enter key support
    document.getElementById('modalInput').addEventListener('keydown', e => { if(e.key === 'Enter') saveModal(); });
    document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target === document.getElementById('modalOverlay')) closeModal(); });

    function clearProxy() {
        saveProxy({});
        refreshDisplay();
        document.getElementById('locationCard').classList.remove('show');
        showToast('🗑️ Proxy config মুছে ফেলা হয়েছে!');
    }

    // Show Proxy Location
    document.getElementById('showLocationBtn').addEventListener('click', async () => {
        const p = loadProxy();
        if (!p.host) { showToast('⚠️ আগে HOST সেট করুন!'); return; }
        showToast('🔍 Location খোঁজা হচ্ছে...');
        try {
            const res = await fetch(`https://ip-api.com/json/${p.host}?fields=status,country,city,isp,query`);
            const data = await res.json();
            const card = document.getElementById('locationCard');
            const txt = document.getElementById('locationText');
            if (data.status === 'success') {
                txt.innerHTML = `🌍 <b>Country:</b> ${data.country}<br>🏙️ <b>City:</b> ${data.city}<br>📡 <b>ISP:</b> ${data.isp}<br>🔢 <b>IP:</b> ${data.query}`;
            } else {
                txt.innerHTML = `⚠️ Location পাওয়া যায়নি। HOST চেক করুন।`;
            }
            card.classList.add('show');
        } catch(e) {
            showToast('❌ Location চেক করতে সমস্যা হয়েছে!');
        }
    });

    // Ads
    document.getElementById('watchAdBtn').addEventListener('click', () => runMonetagAd());
    document.getElementById('autoWatchBtn').addEventListener('click', () => {
        if (autoWatchInterval) { showToast('⚠️ ইতিমধ্যে চলছে!'); return; }
        showToast('🔄 Auto Watch শুরু হয়েছে!');
        autoWatchInterval = setInterval(() => runMonetagAd(), 15000);
    });
    document.getElementById('stopAutoBtn').addEventListener('click', () => {
        if (autoWatchInterval) {
            clearInterval(autoWatchInterval);
            autoWatchInterval = null;
            showToast('🔴 Auto Watch বন্ধ হয়েছে!');
        } else { showToast('⚠️ Auto Watch চালু নেই!'); }
    });

    function runMonetagAd() {
        if (typeof show_11209230 === "function") {
            show_11209230().then(() => showToast('✅ Ad দেখা হয়েছে! Reward Added.')).catch(err => console.error(err));
        } else {
            showToast('🎯 Ad Simulation Triggered!');
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }
</script>
</body>
</html>
